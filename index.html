    });

    const SECRET = "kannami2024";

    function useFirebaseSync(initialG) {
      const [G, setG] = useState(initialG);
      const [connected, setConnected] = useState(false);

      useEffect(() => {
        const connRef = _db.ref(".info/connected");
        connRef.on("value", snap => setConnected(snap.val() === true));
        const gameRef = _db.ref("gameState");
        gameRef.on("value", snap => {
          const val = snap.val();
          if (val) { const {secret, ...rest} = val; setG(rest); }
        });
        return () => { connRef.off(); gameRef.off(); };
      }, []);

      const pushG = (newG) => {
        _db.ref("gameState").set({...newG, secret: SECRET}).catch(e => console.error(e));
      };

      return [G, setG, pushG, connected];
    }

const ts=()=>{const n=new Date();return `${n.getHours()}:${String(n.getMinutes()).padStart(2,"0")}`;};

function ensureInn(g){while(g.innOur.length<g.inning)g.innOur.push(0);while(g.innOpp.length<g.inning)g.innOpp.push(0);}
function addLog(g,msg,type){g.log.unshift({msg,type,t:ts()});if(g.log.length>40)g.log.pop();}
function pushEvent(g,ev){if(!g.events)g.events=[];g.events.push({id:Date.now()+Math.random(),t:ts(),inning:g.inning,isTop:g.isTop,...ev});}
function autoScore(g,isOurs){
  ensureInn(g);
  if(isOurs){g.ourScore++;g.innOur[g.inning-1]++;}
  else{g.oppScore++;g.innOpp[g.inning-1]++;}
  addLog(g,`🏠 得点！(${g.ourScore}-${g.oppScore})`,"r");
  const isBottom=(g.batFirst&&!g.isTop)||(!g.batFirst&&g.isTop);
  if(isBottom&&!g.gameOver){
    const ourIsBottom=!g.batFirst;
    const ourS=g.ourScore, oppS=g.oppScore;
    const bottomLeads=ourIsBottom?(ourS>oppS):(oppS>ourS);
    if(bottomLeads&&g.inning>=g.maxInnings){g.gameOver=true;addLog(g,"🏁 サヨナラ！試合終了！","r");return;}
    if(checkColdGame(g)){g.gameOver=true;addLog(g,"🏁 コールドゲーム成立！","r");}
  }
}
function advBases(g,sp,isHR,isOurs,bat,order){
  if(!g.runnerNames)g.runnerNames=[null,null,null];
  if(isHR){const r=g.bases.filter(Boolean).length;g.bases=[false,false,false];g.runnerNames=[null,null,null];for(let i=0;i<=r;i++)autoScore(g,isOurs);return;}
  for(let i=2;i>=0;i--){
    if(g.bases[i]){
      const nm=g.runnerNames[i];
      const np=i+sp;
      if(sp===1&&i===2)continue;
      if(np<3&&g.bases[np])continue;
      g.bases[i]=false;g.runnerNames[i]=null;
      if(np>=3)autoScore(g,isOurs);
      else{g.bases[np]=true;g.runnerNames[np]=nm;}
    }
  }
  if(sp<=3){
    const lbl=order!=null?`${order}${bat?bat.name.slice(0,2):"?"}`:(bat?bat.name.slice(0,3):"?");
    g.bases[sp-1]=true;g.runnerNames[sp-1]=lbl;
  }
}
function advBasesBB(g,isOurs,bat,order){
  if(!g.runnerNames)g.runnerNames=[null,null,null];
  let chain=0;
  while(chain<3&&g.bases[chain])chain++;
  for(let i=chain-1;i>=0;i--){const nm=g.runnerNames[i];g.bases[i]=false;g.runnerNames[i]=null;if(i+1>=3){autoScore(g,isOurs);}else{g.bases[i+1]=true;g.runnerNames[i+1]=nm;}}
  const lbl=order!=null?`${order}${bat?bat.name.slice(0,2):"?"}`:(bat?bat.name.slice(0,3):"?");
  g.bases[0]=true;g.runnerNames[0]=lbl;
}
function checkColdGame(g){
  if(!g.coldGame||g.gameOver)return false;
  const diff=Math.abs(g.ourScore-g.oppScore);
  if(diff<g.coldDiff)return false;
  const inningOk=g.inning>=g.coldInning;
  if(!inningOk)return false;
  return true;
}
function setupTieBreak(g){
  g.outs=0;g.balls=0;g.strikes=0;
  g.bases=[true,true,false]; // 無死1・2塁
  const isOurs=(g.batFirst&&g.isTop)||(!g.batFirst&&!g.isTop);
  const lu=isOurs?g.lineup:g.lineupThem;
  const cb=isOurs?g.currentBatter:(g.currentBatterThem||0);
  const len=Math.max(lu.length,1);
  const r1=lu[(cb-1+len)%len]; // 直前の打者→1塁
  const r2=lu[(cb-2+len)%len]; // 2つ前の打者→2塁
  g.runnerNames=[
    r1?r1.name.slice(0,3):"走者", // index0=1塁
    r2?r2.name.slice(0,3):"走者", // index1=2塁
    null
  ];
  addLog(g,`⚡ タイブレーク開始（無死1・2塁）`,"s");
}
function doChange(g){
  ensureInn(g);
  g.outs=0;g.balls=0;g.strikes=0;g.bases=[false,false,false];g.runnerNames=[null,null,null];
  if(!g.isTop){
    if(checkColdGame(g)){g.gameOver=true;addLog(g,"🏁 コールドゲーム成立！","r");return;}
    g.inning++;
    if(g.inning>g.maxInnings){
      // 通常イニング終了後の同点チェック（延長打ち切り）
      const maxEx=g.maxExtraInnings||2;
      const extraDone=g.inning-g.maxInnings; // 何延長終わったか
      if(g.ourScore===g.oppScore&&extraDone>maxEx){
        g.gameOver=true;
        addLog(g,`🏁 延長${maxEx}回終了 引き分け・抽選！`,"r");
        return;
      }
      if(g.ourScore!==g.oppScore&&extraDone>maxEx){
        addLog(g,"🏁 試合終了！","r");g.gameOver=true;return;
      }
      if(g.ourScore!==g.oppScore){addLog(g,"🏁 試合終了！","r");g.gameOver=true;return;}
      // 同点で延長続行
    }
  }
  g.isTop=!g.isTop;
  if(g.tieBreak&&g.inning>=g.tieBreakStart){setupTieBreak(g);}
  addLog(g,`🔄 ${g.inning}回${g.isTop?"表":"裏"} 開始`,"s");
}
function setSB(g,key,type,note,fldLabel){
  const b=g.lineup[g.currentBatter];if(!b)return;
  if(!g.scorebook[g.currentBatter])g.scorebook[g.currentBatter]={};
  const sb=g.scorebook[g.currentBatter];
  const arrKey=key+"_arr";
  if(!sb[arrKey])sb[arrKey]=[];
  sb[arrKey].push({type,note:note||type,dir:fldLabel||""});
  sb[key]=type;
  sb[key+"_note"]=note||type;
  if(fldLabel)sb[key+"_dir"]=fldLabel;
}

              {Array.from({length:Math.max(G.maxInnings,G.inning)},(_,idx)=>idx+1).map(inn=>{
                const tKey=`${inn}T`, bKey=`${inn}B`;
                const arrT=(s[tKey+"_arr"]||[]);
                const arrB=(s[bKey+"_arr"]||[]);
                const allAtBats=[...arrT,...arrB];
                if(allAtBats.length===0){
                  const r=s[tKey]||s[bKey]||"";
                  const note=s[tKey+"_note"]||s[bKey+"_note"]||"";
                  if(!r)return(<td key={inn} style={{border:`1px solid ${C.border}`,padding:"3px 4px",textAlign:"center",fontSize:9}}></td>);
                  let d=note||r;
                  if(d==="BB")d="B";
                  else if(d==="HBP")d="DB";
                  else if(d==="KS")d="○K";
                  else if(d==="KR"||d==="K'")d="K'";
                  else if(["1B","2B","3B","HR"].includes(d))d="";
                  if(r==="SH")d="△"+(note&&note!=="SH"?" "+note:"");
                  if(r==="GO"&&note&&note!=="GO")d=note;
                  if(r==="FO"&&note&&note!=="FO")d=note;
                  const col=OUTP_LOCAL.includes(r)?C.red:["1B","2B","3B","HR","FC"].includes(r)?C.green:r==="BB"||r==="HBP"?C.blue:C.text;
                  return(<td key={inn} style={{border:`1px solid ${C.border}`,padding:"3px 4px",textAlign:"center",color:col,fontSize:9}}>{d}</td>);
                }
                const symbols=allAtBats.map(ab=>{
                  const r=ab.type, note=ab.note;
                  let d=note||r;
                  if(d==="BB")d="B";
                  else if(d==="HBP")d="DB";
                  else if(d==="KS")d="○K";
                  else if(d==="KR"||d==="K'")d="K'";
                  else if(["1B","2B","3B","HR"].includes(d))d="安";
                  if(r==="SH")d="△";
                  if(r==="GO"&&note&&note!=="GO")d=note;
                  if(r==="FO"&&note&&note!=="FO")d=note;
                  return{d,r};
                });
                return(
                  <td key={inn} style={{border:`1px solid ${C.border}`,padding:"2px 3px",textAlign:"center",fontSize:8,lineHeight:1.3,verticalAlign:"middle"}}>
                    {symbols.map((s2,si)=>(
                      <span key={si} style={{color:OUTP_LOCAL.includes(s2.r)?C.red:["1B","2B","3B","HR","FC"].includes(s2.r)?C.green:s2.r==="BB"||s2.r==="HBP"?C.blue:C.text,display:"inline"}}>
                        {si>0&&<span style={{color:C.gray}}>/</span>}{s2.d}
                      </span>
                    ))}
                  </td>
                );
              })}
              {[p.ab||0,p.hits||0,p.rbi||0].map((v,j)=>(
                <td key={j} style={{border:`1px solid ${C.border}`,padding:"3px 4px",textAlign:"center",color:j===1?C.green:C.text}}>{v}</td>
              ))}
            </tr>
            );
          })}
        </tbody>
      </table>
    </div>
    <div style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,padding:10}}>
      <div style={{fontSize:9,fontWeight:900,color:C.gold,marginBottom:6}}>イニング別得点</div>
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
          <tbody>
            <tr><td style={{padding:"2px 5px",fontSize:8,color:C.gray}}></td>
              {Array.from({length:Math.max(G.maxInnings,G.inning)},(_,i)=><td key={i} style={{padding:"2px 5px",textAlign:"center",fontWeight:900,color:C.gold}}>{i+1}</td>)}
              <td style={{padding:"2px 5px",textAlign:"center",fontWeight:900,color:C.gold,borderLeft:`1px solid ${C.border}`}}>計</td>
            </tr>
            {[[G.ourTeam,G.innOur,G.ourScore,C.green],[G.oppTeam,G.innOpp,G.oppScore,C.gray]].map(([team,inn,tot,col])=>(
              <tr key={String(team)}>
                <td style={{padding:"3px 5px",fontWeight:900,color:col}}>{team}</td>
                {Array.from({length:Math.max(G.maxInnings,G.inning)},(_,i)=><td key={i} style={{textAlign:"center",fontWeight:700,color:col}}>{inn[i]!==undefined?inn[i]:"-"}</td>)}
                <td style={{textAlign:"center",fontSize:16,fontWeight:900,color:col,borderLeft:`1px solid ${C.border}`}}>{tot}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  </>);
}

function LineupTab({G,upd,snap,showToast,C,sec}){
  const[teamSel,setTeamSel]=useState("us");
  const[subMode,setSubMode]=useState("sub");
  const[selBench,setSelBench]=useState(null);
  const[selShuffleA,setSelShuffleA]=useState(null);
  const[selShuffleB,setSelShuffleB]=useState(null);
  const[pendingSub,setPendingSub]=useState(null);
  const[pendingPos,setPendingPos]=useState(null);
  const[newPosIn,setNewPosIn]=useState("");
  const[newPosA,setNewPosA]=useState("");
  const[newPosB,setNewPosB]=useState("");
  const[editTarget,setEditTarget]=useState(null);
  const[deleteTarget,setDeleteTarget]=useState(null);
  const[showAddLineup,setShowAddLineup]=useState(false);
  const[showAddBench,setShowAddBench]=useState(false);
  const isUs=teamSel==="us";
  const lineup=isUs?G.lineup:G.lineupThem;
  const benchArr=isUs?(G.bench||[]):(G.benchThem||[]);
  const resetSel=()=>{setSelBench(null);setSelShuffleA(null);setSelShuffleB(null);setPendingSub(null);setPendingPos(null);};
  const changeMode=m=>{resetSel();setSubMode(m);};
  const doSub=()=>{
    if(!pendingSub)return;
    snap();
    upd(g=>{
      const lu=isUs?g.lineup:g.lineupThem;
      if(!g.bench)g.bench=[];if(!g.benchThem)g.benchThem=[];
      const bu=isUs?g.bench:g.benchThem;
      const outP=Object.assign({},lu[pendingSub.si]);
      const inP=Object.assign({},bu[pendingSub.bi]);
      lu[pendingSub.si]=Object.assign({},inP,{pos:newPosIn,ab:inP.ab||0,hits:inP.hits||0,rbi:inP.rbi||0,runs:inP.runs||0});
      bu.splice(pendingSub.bi,1);
      bu.push(Object.assign({},outP,{retired:true}));
      if(!g.substitutions)g.substitutions=[];
      g.substitutions.push({inning:g.inning,isTop:g.isTop,team:isUs?"us":"them",type:"playerIn",playerIdx:pendingSub.si,oldName:outP.name,oldPos:outP.pos,newName:inP.name,newPos:newPosIn,newNum:inP.num||""});
      addLog(g,`⇄ ${inP.name}(${newPosIn}) IN → ${outP.name} OUT`,"s");
    });
    showToast(`${pendingSub.inName} IN → ${pendingSub.outName} OUT`);
    resetSel();
  };
  const doPos=()=>{
    if(!pendingPos)return;
    snap();
    upd(g=>{
      const lu=isUs?g.lineup:g.lineupThem;
      const oA=lu[pendingPos.ia].pos;const oB=lu[pendingPos.ib].pos;
      lu[pendingPos.ia].pos=newPosA;lu[pendingPos.ib].pos=newPosB;
      if(!g.substitutions)g.substitutions=[];
      g.substitutions.push({inning:g.inning,isTop:g.isTop,team:isUs?"us":"them",type:"posSwap",playerIdx:pendingPos.ia,oldPos:oA,newPos:newPosA,playerName:lu[pendingPos.ia].name,nameB:lu[pendingPos.ib].name,oldPosB:oB,newPosB:newPosB});
      addLog(g,`↔ ${lu[pendingPos.ia].name} ${oA}→${newPosA} / ${lu[pendingPos.ib].name} ${oB}→${newPosB}`,"s");
    });
    showToast("守備交代を記録しました");
    resetSel();
  };
  const card={background:"#fff",border:"1.5px solid #d0d7e0",borderRadius:12,padding:10,marginBottom:8};
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <button onClick={()=>{setTeamSel("us");resetSel();}} style={{flex:1,padding:"9px 4px",border:`2px solid ${isUs?C.green:C.border}`,borderRadius:8,background:isUs?"#f0faf3":C.bg,color:isUs?C.green:C.gray,fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>{G.ourTeam}</button>
        <button onClick={()=>{setTeamSel("them");resetSel();}} style={{flex:1,padding:"9px 4px",border:`2px solid ${!isUs?C.red:C.border}`,borderRadius:8,background:!isUs?"#fff5f5":C.bg,color:!isUs?C.red:C.gray,fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>{G.oppTeam}</button>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:8}}>
        {[["sub","⇄ 選手交代"],["pos","↔ 守備交代"],["log","📋 履歴"]].map(([m,lbl])=>(
          <button key={m} onClick={()=>changeMode(m)} style={{flex:1,padding:"7px 4px",borderRadius:7,fontSize:10,fontWeight:900,cursor:"pointer",fontFamily:"inherit",border:`1.5px solid ${subMode===m?C.blue:C.border}`,background:subMode===m?C.blue:"#f8fafc",color:subMode===m?"#fff":C.gray}}>{lbl}</button>
        ))}
      </div>
      {deleteTarget&&(
        <div style={{background:"#fff5f5",border:"1.5px solid #cc2222",borderRadius:12,padding:12,marginBottom:8,textAlign:"center"}}>
          <div style={{fontSize:13,fontWeight:900,color:C.text,marginBottom:4}}>{deleteTarget.name} を削除しますか？</div>
          <div style={{fontSize:10,color:C.gray,marginBottom:10}}>この操作は取り消せません</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setDeleteTarget(null)} style={{flex:1,background:"#f0f2f5",border:"none",borderRadius:8,padding:"9px 0",color:C.text,fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>キャンセル</button>
            <button onClick={()=>{upd(g=>{if(deleteTarget.type==="lineup"){const lu=isUs?g.lineup:g.lineupThem;const sb=isUs?g.scorebook:g.scorebookThem;lu.splice(deleteTarget.idx,1);sb.splice(deleteTarget.idx,1);if(isUs&&g.currentBatter>=g.lineup.length)g.currentBatter=Math.max(0,g.lineup.length-1);}else{const bu=isUs?g.bench:g.benchThem;if(bu)bu.splice(deleteTarget.idx,1);}});setDeleteTarget(null);}} style={{flex:1,background:C.red,border:"none",borderRadius:8,padding:"9px 0",color:"#fff",fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>削除</button>
          </div>
        </div>
      )}
      {editTarget&&(
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:900,color:C.navy}}>選手を編集</div>
            <button onClick={()=>setEditTarget(null)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.gray}}>✕</button>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <input value={editTarget.name} onChange={e=>setEditTarget(m=>({...m,name:e.target.value}))} style={{flex:1,background:"#fff",border:"2px solid #d0d7e0",borderRadius:8,padding:"8px 10px",fontSize:16,outline:"none",fontFamily:"inherit"}} placeholder="名前" maxLength={8}/>
            <input value={editTarget.num} onChange={e=>setEditTarget(m=>({...m,num:e.target.value}))} type="number" style={{width:70,background:"#fff",border:"2px solid #d0d7e0",borderRadius:8,padding:"8px 6px",fontSize:16,outline:"none",fontFamily:"inherit",textAlign:"center"}} placeholder="#"/>
          </div>
          <div style={{fontSize:9,fontWeight:900,color:C.blue,letterSpacing:".1em",marginBottom:5}}>守備位置</div>
          <PosGrid selected={editTarget.pos} onPick={p=>setEditTarget(m=>({...m,pos:p}))} C={C}/>
          <button onClick={()=>{if(!editTarget.name.trim()){showToast("名前を入力してください");return;}upd(g=>{const col=editTarget.type==="bench"?(isUs?g.bench:g.benchThem):(isUs?g.lineup:g.lineupThem);if(col)col[editTarget.idx]=Object.assign({},col[editTarget.idx],{name:editTarget.name.trim(),pos:editTarget.pos,num:editTarget.num});});showToast("更新しました");setEditTarget(null);}} style={{width:"100%",background:C.green,border:"none",borderRadius:8,padding:11,color:"#fff",fontFamily:"inherit",fontSize:13,fontWeight:900,cursor:"pointer"}}>💾 保存</button>
        </div>
      )}
      {subMode==="sub"&&(
        <div>
          {pendingSub&&(
            <div style={card}>
              <div style={{fontSize:11,fontWeight:900,color:C.navy,textAlign:"center",marginBottom:8}}>⇄ 選手交代の確認</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                <div style={{flex:1,background:"#f0faf3",border:`1.5px solid ${C.green}`,borderRadius:8,padding:"8px",textAlign:"center"}}>
                  <div style={{fontSize:9,fontWeight:900,color:C.green,marginBottom:2}}>IN</div>
                  <div style={{fontSize:13,fontWeight:900,color:C.green}}>{pendingSub.inName}</div>
                </div>
                <div style={{fontSize:20,color:C.gray,flexShrink:0}}>→</div>
                <div style={{flex:1,background:"#fff5f5",border:`1.5px solid ${C.red}`,borderRadius:8,padding:"8px",textAlign:"center"}}>
                  <div style={{fontSize:9,fontWeight:900,color:C.red,marginBottom:2}}>OUT</div>
                  <div style={{fontSize:13,fontWeight:900,color:C.red}}>{pendingSub.outName}</div>
                  <div style={{fontSize:9,color:"#cc5555"}}>{lineup[pendingSub.si]?lineup[pendingSub.si].pos:""}</div>
                </div>
              </div>
              <div style={{fontSize:9,fontWeight:900,color:C.blue,marginBottom:4}}>{pendingSub.inName} の守備位置</div>
              <PosGrid selected={newPosIn} onPick={setNewPosIn} C={C}/>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setPendingSub(null);setSelBench(null);}} style={{flex:1,background:"#f0f2f5",border:"none",borderRadius:7,padding:"9px 0",color:C.text,fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>キャンセル</button>
                <button onClick={doSub} style={{flex:2,background:C.green,border:"none",borderRadius:7,padding:"9px 0",color:"#fff",fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>✓ 交代を記録</button>

          <div style={sec}>▸ スタメン</div>
          <div style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:4}}>
            {!lineup.length&&<div style={{padding:12,color:C.gray,fontSize:12,textAlign:"center"}}>選手を登録してください</div>}
            {lineup.map((p,i)=>{
              const isTgt=pendingSub&&pendingSub.si===i;
              const bg=isTgt?"#fff8e1":selBench!==null?"#f0faf3":"#fff";
              const bc=isTgt?"#e65100":selBench!==null?C.green:C.border;
              return(
                <div key={i} onClick={()=>{if(selBench!==null&&!pendingSub){const b=benchArr[selBench];setPendingSub({si:i,bi:selBench,outName:p.name,inName:b.name});setNewPosIn(b.pos);}}} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 9px",borderBottom:i<lineup.length-1?`1px solid ${C.border}`:"none",background:bg,cursor:selBench!==null?"pointer":"default",borderLeft:`1.5px solid ${bc}`,transition:"background .12s"}}>
                  <span onClick={e=>{e.stopPropagation();upd(g=>{if(isUs)g.currentBatter=i;else g.currentBatterThem=i;});}} style={{fontWeight:900,color:isUs?C.gold:C.red,fontSize:16,minWidth:22,cursor:"pointer",textAlign:"center"}}>{i+1}</span>
                  <span style={{fontSize:10,fontWeight:900,background:"#f0f2f5",color:C.gray,borderRadius:4,padding:"2px 5px",flexShrink:0}}>{p.pos}</span>

                  <button onClick={e=>{e.stopPropagation();setEditTarget({idx:i,isUs,type:"lineup",name:p.name,pos:p.pos,num:p.num||""});}} style={{background:"#f0f5ff",border:`1px solid ${C.blue}`,borderRadius:5,padding:"3px 7px",color:C.blue,fontFamily:"inherit",fontSize:10,fontWeight:900,cursor:"pointer"}}>編集</button>

          {showAddLineup&&<div style={{marginBottom:8}}><AddPlayerForm onAdd={p=>{upd(g=>{if(isUs){g.lineup.push(Object.assign({},p,{ab:0,hits:0,rbi:0,runs:0}));g.scorebook.push({});}else{g.lineupThem.push(Object.assign({},p,{ab:0,hits:0,rbi:0,runs:0}));g.scorebookThem.push({});}});}} showToast={showToast}/></div>}
          <div style={sec}>▸ 控え</div>
          <div style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:4}}>

                  <span style={{fontSize:10,fontWeight:900,color:"#a03030",width:18,textAlign:"center"}}>退</span>
                  <span style={{fontSize:10,fontWeight:900,background:"#fff0f0",color:"#a03030",borderRadius:4,padding:"2px 5px"}}>{p.pos}</span>
                  <span style={{fontSize:13,fontWeight:700,flex:1,color:"#a03030",textDecoration:"line-through"}}>{p.name}</span>
                  <span style={{fontSize:9,background:"#fff0f0",color:"#a03030",borderRadius:100,padding:"1px 6px",fontWeight:700}}>OUT</span>
                </div>
              );}
              const isSel=selBench===i;
              const isDim=selBench!==null&&!isSel;
              return(
                <div key={i} onClick={()=>{if(isSel){setSelBench(null);setPendingSub(null);}else{setSelBench(i);setPendingSub(null);}}} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 9px",borderBottom:i<benchArr.length-1?`1px solid ${C.border}`:"none",background:isSel?"#E6F1FB":"#f8fafc",opacity:isDim?0.45:1,cursor:"pointer",borderLeft:`${isSel?"2px":"1.5px"} solid ${isSel?"#378ADD":C.border}`,transition:"background .12s"}}>
                  <span style={{fontSize:10,fontWeight:900,color:C.gray,width:18,textAlign:"center"}}>控</span>
                  <span style={{fontSize:10,fontWeight:900,background:"#f0f2f5",color:C.gray,borderRadius:4,padding:"2px 5px"}}>{p.pos}</span>
                  <span style={{fontSize:13,fontWeight:700,flex:1}}>{p.name}</span>
                  <span style={{fontSize:9,color:"#9a7a42"}}>#{p.num}</span>
                  <button onClick={e=>{e.stopPropagation();snap();upd(g=>{const lu=isUs?g.lineup:g.lineupThem;const bu=isUs?g.bench:g.benchThem;if(!g.runnerNames)g.runnerNames=[null,null,null];const runnerBase=g.runnerNames.findIndex(r=>r!==null);if(runnerBase<0){showToast("塁上に走者がいません");return;}const rnLabel=g.runnerNames[runnerBase];const outIdx=lu.findIndex(pl=>{const lbl=pl.num?"#"+pl.num:pl.name.slice(0,3);return lbl===rnLabel||pl.name.slice(0,3)===rnLabel;});if(outIdx<0){showToast("走者の選手が特定できません");return;}const outP=Object.assign({},lu[outIdx]);const inP=Object.assign({},bu[i]);lu[outIdx]=Object.assign({},inP,{pos:outP.pos,ab:inP.ab||0,hits:inP.hits||0,rbi:inP.rbi||0,runs:inP.runs||0,isSub:true,originalBatter:outP.name});bu.splice(i,1);bu.push(Object.assign({},outP,{retired:true}));const newLbl=inP.num?"#"+inP.num:inP.name.slice(0,3);g.runnerNames[runnerBase]=newLbl;if(!g.substitutions)g.substitutions=[];g.substitutions.push({inning:g.inning,isTop:g.isTop,team:isUs?"us":"them",type:"pinchRunner",playerIdx:outIdx,runnerBase:runnerBase+1,newName:inP.name,oldName:outP.name,newNum:inP.num||""});addLog(g,`💨 代走 ${inP.name} → ${outP.name}（${["一","二","三"][runnerBase]}塁）`,"b");showToast(`代走 ${inP.name}！`);});}} style={{background:"#e3f2fd",border:`1px solid #0288d1`,borderRadius:5,padding:"3px 6px",color:"#0288d1",fontFamily:"inherit",fontSize:9,fontWeight:900,cursor:"pointer",whiteSpace:"nowrap"}}>代走</button>
                  <button onClick={e=>{e.stopPropagation();setEditTarget({idx:i,isUs,type:"bench",name:p.name,pos:p.pos,num:p.num||""});}} style={{background:"#f0f5ff",border:`1px solid ${C.blue}`,borderRadius:5,padding:"3px 7px",color:C.blue,fontFamily:"inherit",fontSize:10,fontWeight:900,cursor:"pointer"}}>編集</button>
                  <button onClick={e=>{e.stopPropagation();setDeleteTarget({idx:i,name:p.name,type:"bench"});}} style={{background:"#fff5f5",border:`1px solid ${C.red}`,borderRadius:5,padding:"3px 6px",color:C.red,fontFamily:"inherit",fontSize:10,fontWeight:900,cursor:"pointer"}}>✕</button>
                </div>
              );
            })}
          </div>
          <button onClick={()=>setShowAddBench(v=>!v)} style={{width:"100%",background:showAddBench?"#e8f0ff":"#f0f5ff",border:`1.5px solid ${C.blue}`,borderRadius:8,padding:"7px 0",color:C.blue,fontFamily:"inherit",fontSize:11,fontWeight:900,cursor:"pointer",marginBottom:showAddBench?4:8}}>{showAddBench?"▲ 閉じる":"＋ 控え追加"}</button>
          {showAddBench&&<div style={{marginBottom:8}}><AddPlayerForm onAdd={p=>{upd(g=>{if(!g.bench)g.bench=[];if(!g.benchThem)g.benchThem=[];if(isUs)g.bench.push(Object.assign({},p,{ab:0,hits:0,rbi:0,runs:0,retired:false}));else g.benchThem.push(Object.assign({},p,{ab:0,hits:0,rbi:0,runs:0,retired:false}));});}} showToast={showToast}/></div>}
          <button onClick={()=>upd(g=>{if(isUs){g.lineup=[];g.bench=[];g.scorebook=[];g.currentBatter=0;}else{g.lineupThem=[];g.benchThem=[];g.scorebookThem=[];g.currentBatterThem=0;}})} style={{width:"100%",background:C.red,border:"none",borderRadius:8,padding:9,color:"#fff",fontFamily:"inherit",fontSize:11,fontWeight:900,cursor:"pointer",marginTop:4}}>{isUs?G.ourTeam:G.oppTeam} をリセット</button>
        </div>
      )}
      {subMode==="pos"&&(
        <div>
          {pendingPos&&(
            <div style={card}>
              <div style={{fontSize:11,fontWeight:900,color:C.navy,textAlign:"center",marginBottom:8}}>↔ 守備交代の確認</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                <div style={{flex:1,background:"#f0f5ff",border:`1.5px solid ${C.blue}`,borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:900,color:"#0C447C",marginBottom:2}}>{lineup[pendingPos.ia]?lineup[pendingPos.ia].name:""}</div>
                  <div style={{fontSize:9,color:"#185FA5",marginBottom:4}}>{lineup[pendingPos.ia]?lineup[pendingPos.ia].pos:""} →</div>
                  <PosGrid selected={newPosA} onPick={setNewPosA} C={C}/>
                </div>
                <div style={{fontSize:20,color:C.gray,flexShrink:0}}>↔</div>
                <div style={{flex:1,background:"#f0f5ff",border:`1.5px solid ${C.blue}`,borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:900,color:"#0C447C",marginBottom:2}}>{lineup[pendingPos.ib]?lineup[pendingPos.ib].name:""}</div>
                  <div style={{fontSize:9,color:"#185FA5",marginBottom:4}}>{lineup[pendingPos.ib]?lineup[pendingPos.ib].pos:""} →</div>
                  <PosGrid selected={newPosB} onPick={setNewPosB} C={C}/>
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setPendingPos(null);setSelShuffleA(null);setSelShuffleB(null);}} style={{flex:1,background:"#f0f2f5",border:"none",borderRadius:7,padding:"9px 0",color:C.text,fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>キャンセル</button>
                <button onClick={doPos} style={{flex:2,background:C.blue,border:"none",borderRadius:7,padding:"9px 0",color:"#fff",fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>✓ 守備交代を記録</button>
              </div>
            </div>
          )}
          <div style={{fontSize:10,color:C.blue,fontWeight:700,marginBottom:6,textAlign:"center"}}>守備位置を変えたい選手をタップ → 交換先をタップ</div>
          <div style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
            {!lineup.length&&<div style={{padding:12,color:C.gray,fontSize:12,textAlign:"center"}}>スタメンを登録してください</div>}
            {lineup.map((p,i)=>{
              const isA=selShuffleA===i;const isB=selShuffleB===i;
              const bg=isA?"#E6F1FB":isB?"#fff8e1":selShuffleA!==null?"#f0faf3":"#fff";
              const bc=isA?"#378ADD":isB?"#e65100":selShuffleA!==null?C.green:C.border;
              return(
                <div key={i} onClick={()=>{if(pendingPos)return;if(selShuffleA===null){setSelShuffleA(i);setSelShuffleB(null);}else if(selShuffleA===i){setSelShuffleA(null);setSelShuffleB(null);}else{setSelShuffleB(i);setPendingPos({ia:selShuffleA,ib:i});setNewPosA(lineup[selShuffleA].pos);setNewPosB(lineup[i].pos);}}} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 9px",borderBottom:i<lineup.length-1?`1px solid ${C.border}`:"none",background:bg,cursor:"pointer",borderLeft:`1.5px solid ${bc}`,transition:"background .12s"}}>
                  <span style={{fontWeight:900,color:isUs?C.gold:C.red,fontSize:14,minWidth:18,textAlign:"center"}}>{i+1}</span>
                  <span style={{fontSize:10,fontWeight:900,background:"#f0f2f5",color:C.gray,borderRadius:4,padding:"2px 5px"}}>{p.pos}</span>
                  <span style={{fontSize:13,fontWeight:700,flex:1}}>{p.name}</span>
                  {isA&&<span style={{fontSize:9,color:"#378ADD",fontWeight:900}}>①</span>}
                  {isB&&<span style={{fontSize:9,color:"#e65100",fontWeight:900}}>②</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {subMode==="log"&&(
        <div>
          <div style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
            {!(G.substitutions||[]).filter(s=>s.team===(isUs?"us":"them")).length&&(<div style={{padding:12,color:C.gray,fontSize:12,textAlign:"center"}}>交代記録なし</div>)}
            {(G.substitutions||[]).filter(s=>s.team===(isUs?"us":"them")).map((s,i)=>{
              const msg=s.type==="playerIn"?(`${s.newName}(${s.newPos}) IN → ${s.oldName} OUT`):s.type==="posSwap"?(`${s.playerName} ${s.oldPos}→${s.newPos} / ${s.nameB} ${s.oldPosB}→${s.newPosB}`):s.type==="pinchRunner"?(`💨 代走 ${s.newName} → ${s.oldName}（${s.runnerBase}塁）`):`${s.playerName} ${s.oldPos}→${s.newPos}`;
              return(<div key={i} style={{display:"flex",gap:6,padding:"7px 10px",borderBottom:`1px solid ${C.border}`,fontSize:11}}><span style={{fontSize:9,color:C.gold,flexShrink:0,marginTop:1}}>{s.inning}回{s.isTop?"表":"裏"}</span><span style={{flex:1,color:C.text}}>{msg}</span></div>);
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function HistCard({h,onDelete}){
  const[open,setOpen]=useState(false);
  const winner=h.ourScore>h.oppScore?h.ourTeam:h.ourScore<h.oppScore?h.oppTeam:"引き分け";
  return(
    <div style={{background:"#0d1e3a",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,marginBottom:8,overflow:"hidden"}}>
      {/* ヘッダー */}
      <div style={{padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,.08)"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,.45)",marginBottom:2}}>{h.gameDate||"日付未設定"}{h.gameLocation?" · "+h.gameLocation:""}{h.gameStartTime?" "+h.gameStartTime:""}</div>
            <div style={{fontSize:13,fontWeight:900,color:"#fff"}}>{h.ourTeam} <span style={{color:"rgba(255,255,255,.35)"}}>vs</span> {h.oppTeam}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:24,fontWeight:900,color:"#ffd740",lineHeight:1}}>{h.ourScore} - {h.oppScore}</div>
            <div style={{fontSize:9,fontWeight:900,color:winner==="引き分け"?"#aaa":"#7ec8ff",marginTop:2}}>{winner==="引き分け"?"引き分け":"⚾ "+winner+" 勝利"}</div>
          </div>
        </div>
        {/* イニング得点 */}
        <div style={{overflowX:"auto",marginTop:8}}>
          <table style={{borderCollapse:"collapse",minWidth:180}}>
            <tbody>
              {[[h.ourTeam,h.innOur||[]],[h.oppTeam,h.innOpp||[]]].map(function(row,ri){
                var team=row[0];var inn=row[1];
                return(
                  <tr key={ri}>
                    <td style={{fontSize:8,color:"rgba(255,255,255,.5)",padding:"2px 8px 2px 0",whiteSpace:"nowrap",fontWeight:700}}>{team}</td>
                    {Array.from({length:Math.max(h.maxInnings||7,inn.length)},function(_,j){
                      return(<td key={j} style={{fontSize:10,textAlign:"center",padding:"2px 4px",color:inn[j]>0?"#ffd740":"rgba(255,255,255,.25)",fontWeight:inn[j]>0?900:400,minWidth:16}}>{inn[j]!==undefined?inn[j]:"-"}</td>);
                    })}
                    <td style={{fontSize:12,fontWeight:900,padding:"2px 0 2px 10px",borderLeft:"1px solid rgba(255,255,255,.15)",color:ri===0?h.ourScore>h.oppScore?"#ffd740":"#fff":h.oppScore>h.ourScore?"#ffd740":"#fff"}}>{ri===0?h.ourScore:h.oppScore}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {/* 展開・削除 */}
      <div style={{display:"flex",gap:0}}>
        <button onClick={()=>setOpen(function(v){return !v;})} style={{flex:1,padding:"8px 0",background:"transparent",border:"none",color:"rgba(255,255,255,.55)",fontFamily:"inherit",fontSize:10,fontWeight:700,cursor:"pointer",borderRight:onDelete?"1px solid rgba(255,255,255,.08)":"none"}}>{open?"▲ 閉じる":"▼ 打者成績 / ログ"}</button>
        {onDelete&&<button onClick={onDelete} style={{padding:"8px 14px",background:"transparent",border:"none",color:"rgba(255,100,100,.7)",fontFamily:"inherit",fontSize:10,fontWeight:700,cursor:"pointer"}}>🗑</button>}
      </div>
      {open&&(
        <div style={{padding:"10px 12px",borderTop:"1px solid rgba(255,255,255,.08)"}}>
          {/* 打者成績 両チーム */}
          {[h.ourTeam,h.oppTeam].map(function(team,ti){
            var lu=ti===0?(h.lineup||[]):(h.lineupThem||[]);
            if(!lu.length)return null;
            return(
              <div key={ti} style={{marginBottom:10}}>
                <div style={{fontSize:9,fontWeight:900,color:"#ffd740",marginBottom:4}}>{team}</div>
                <table style={{borderCollapse:"collapse",width:"100%",fontSize:9}}>
                  <thead>
                    <tr>{["打","名前","打数","安打","打点"].map(function(h2){return(<th key={h2} style={{color:"rgba(255,255,255,.4)",fontWeight:700,padding:"2px 4px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,.1)"}}>{h2}</th>);})}</tr>
                  </thead>
                  <tbody>
                    {lu.map(function(p,pi){return(
                      <tr key={pi}>
                        <td style={{textAlign:"center",color:"rgba(255,255,255,.4)",padding:"2px 4px"}}>{pi+1}</td>
                        <td style={{color:"#fff",padding:"2px 6px",fontWeight:700}}>{p.name}</td>
                        <td style={{textAlign:"center",color:"rgba(255,255,255,.6)",padding:"2px 4px"}}>{p.ab||0}</td>
                        <td style={{textAlign:"center",color:"#7ec8ff",padding:"2px 4px",fontWeight:p.hits>0?900:400}}>{p.hits||0}</td>
                        <td style={{textAlign:"center",color:"#ffd740",padding:"2px 4px",fontWeight:p.rbi>0?900:400}}>{p.rbi||0}</td>
                      </tr>
                    );})}
                  </tbody>
                </table>
              </div>
            );
          })}
          {/* 速報ログ */}
          {(h.log||[]).length>0&&(
            <div>
              <div style={{fontSize:9,fontWeight:900,color:"rgba(255,255,255,.45)",marginBottom:4}}>速報ログ</div>
              <div style={{maxHeight:150,overflowY:"auto"}}>
                {(h.log||[]).map(function(entry,li){return(
                  <div key={li} style={{display:"flex",gap:6,padding:"3px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                    <span style={{fontSize:7,color:"rgba(255,255,255,.25)",flexShrink:0,marginTop:1}}>{entry.t||""}</span>
                    <span style={{fontSize:10,color:entry.type==="r"?"#ffd740":entry.type==="o"?"#ff8888":entry.type==="b"?"#7ec8ff":"rgba(255,255,255,.75)"}}>{entry.msg||""}</span>
                  </div>
                );})}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function HistoryTab(){
  const[hist,setHist]=useState(function(){try{return JSON.parse(localStorage.getItem("yakyu_history")||"[]");}catch(e){return [];}});
  const deleteOne=(id)=>{const next=hist.filter(function(h){return h.id!==id;});setHist(next);try{localStorage.setItem("yakyu_history",JSON.stringify(next));}catch(e){}};
  const deleteAll=()=>{setHist([]);try{localStorage.removeItem("yakyu_history");}catch(e){}};
  return(
    <div style={{background:"#0a1628",minHeight:"100%",padding:"10px 8px",borderRadius:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:900,color:"#ffd740"}}>📚 過去の試合</div>
        <button onClick={()=>{try{setHist(JSON.parse(localStorage.getItem("yakyu_history")||"[]"));}catch(e){setHist([]);}}} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:6,padding:"3px 8px",color:"rgba(255,255,255,.7)",fontFamily:"inherit",fontSize:10,fontWeight:700,cursor:"pointer"}}>更新</button>
      </div>
      {!hist.length&&<div style={{textAlign:"center",color:"rgba(255,255,255,.35)",fontSize:12,padding:"32px 0"}}>保存された試合はありません<br/><span style={{fontSize:10,marginTop:4,display:"block"}}>試合終了ボタンを押すと自動保存されます</span></div>}
      {hist.map(function(h){return(<HistCard key={h.id} h={h} onDelete={function(){deleteOne(h.id);}}/>);})}
      {hist.length>0&&(
        <button onClick={deleteAll} style={{width:"100%",background:"transparent",border:"1px solid rgba(255,100,100,.4)",borderRadius:8,padding:8,color:"rgba(255,120,120,.8)",fontFamily:"inherit",fontSize:10,fontWeight:700,cursor:"pointer",marginTop:4}}>全履歴を削除</button>
      )}
    </div>
  );
}

function ConfigPanel({G,upd,showToast,snap}){

  const[coldDiff,setColdDiff]=useState(G.coldDiff||10);
  const[coldInn,setColdInn]=useState(G.coldInning||3);
  const[maxEx,setMaxEx]=useState(G.maxExtraInnings||2);

  const tog=(val,setVal)=>(<button onClick={()=>setVal(v=>!v)} style={{background:val?"#1a7a3a":"#f0f2f5",border:`2px solid ${val?"#1a7a3a":"#b0bbc8"}`,borderRadius:100,padding:"4px 12px",color:val?"#fff":"#6b7a8d",fontFamily:"inherit",fontSize:11,fontWeight:900,cursor:"pointer",minWidth:52}}>{val?"ON":"OFF"}</button>);

      <div style={{background:"#fff",border:"1.5px solid #d0d7e0",borderRadius:12,padding:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",marginBottom:8}}>
        <div style={{fontSize:9,fontWeight:900,color:C.gold,letterSpacing:".1em",marginBottom:6}}>基本設定</div>
        {[["🏟","我がチーム名",our,setOur,"text"],["⚔️","相手チーム名",opp,setOpp,"text"]].map(([ico,lbl,val,set,type])=>(
          <div key={lbl} style={{display:"flex",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #d0d7e0",gap:8}}>
            <span style={{fontSize:18}}>{ico}</span><span style={{flex:1,fontSize:13,fontWeight:700}}>{lbl}</span>

        <div style={{display:"flex",alignItems:"center",padding:"10px 0",gap:8}}>

          <span>我がチーム計: <strong style={{color:C.navy}}>{G.pitchCount||0}球</strong></span>

        </div>

      <div style={{background:"#fff",border:"1.5px solid #d0d7e0",borderRadius:12,padding:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",marginBottom:8}}>
        <div style={{fontSize:9,fontWeight:900,color:C.gold,letterSpacing:".1em",marginBottom:6}}>⚡ タイブレーク設定</div>
        {row("⚡","タイブレーク",tog(tb,setTb))}
        {tb&&row("🔢","開始イニング",<select value={tbStart} onChange={e=>setTbStart(Number(e.target.value))} style={fi}>{[7,8,9,10].map(n=><option key={n} value={n}>{n}回から</option>)}</select>)}

      <div style={{background:"#fff",border:"1.5px solid #d0d7e0",borderRadius:12,padding:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",marginBottom:8}}>
        <div style={{fontSize:9,fontWeight:900,color:C.gold,letterSpacing:".1em",marginBottom:6}}>⏱ 延長打ち切り設定</div>

        <div style={{fontSize:10,color:C.gray,marginTop:4}}>同点のまま超えたら引き分け・抽選（くじ引き）</div>
      </div>
      <div style={{background:"#fff",border:"1.5px solid #d0d7e0",borderRadius:12,padding:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",marginBottom:8}}>
        <div style={{fontSize:9,fontWeight:900,color:C.gold,letterSpacing:".1em",marginBottom:6}}>🏁 コールドゲーム設定</div>
        {row("🏁","コールドゲーム",tog(cold,setCold))}
        {cold&&<>
          {row("📊","コールド点差",<select value={coldDiff} onChange={e=>setColdDiff(Number(e.target.value))} style={fi}>{[5,7,8,10,15].map(n=><option key={n} value={n}>{n}点差</option>)}</select>)}
          {row("🔢","適用開始イニング",<select value={coldInn} onChange={e=>setColdInn(Number(e.target.value))} style={fi}>{[3,4,5].map(n=><option key={n} value={n}>{n}回以降</option>)}</select>)}
        </>}
      </div>
      <button onClick={()=>{upd(g=>{g.ourTeam=our;g.oppTeam=opp;g.maxInnings=inn;g.batFirst=bf;g.tieBreak=tb;g.tieBreakStart=tbStart;g.coldGame=cold;g.coldDiff=coldDiff;g.coldInning=coldInn;g.maxExtraInnings=maxEx;g.gameDate=gameDate;g.gameLocation=gameLocation;g.gameStartTime=gameStartTime;});showToast("設定を保存");}} style={{width:"100%",background:"#1a7a3a",border:"none",borderRadius:8,padding:10,color:"#fff",fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer",marginTop:4}}>💾 設定を保存</button>
      <div style={{display:"flex",gap:6,marginTop:6}}>
        <button onClick={()=>{upd(g=>{
          const resetPlayer=p=>Object.assign({},p,{ab:0,hits:0,rbi:0,runs:0,retired:false,isSub:false});
          const savedLineup=(g.lineup||[]).map(resetPlayer);
          const savedBench=(g.bench||[]).filter(b=>!b.retired).map(resetPlayer);
          const savedLineupThem=(g.lineupThem||[]).map(resetPlayer);
          const savedBenchThem=(g.benchThem||[]).filter(b=>!b.retired).map(resetPlayer);
          g.inning=1;g.isTop=true;g.balls=0;g.strikes=0;g.outs=0;
          g.bases=[false,false,false];g.runnerNames=[null,null,null];
          g.ourScore=0;g.oppScore=0;g.innOur=[];g.innOpp=[];
          g.currentBatter=0;g.currentBatterThem=0;
          g.substitutions=[];g.log=[];g.events=[];
          g.pitchCount=0;g.pitchCountThem=0;g.pitchLog=[];
          g.gameOver=false;g.gameStartTime="";
          g.lineup=savedLineup;g.bench=savedBench;
          g.lineupThem=savedLineupThem;g.benchThem=savedBenchThem;
          g.scorebook=savedLineup.map(()=>({}));
          g.scorebookThem=savedLineupThem.map(()=>({}));
        });showToast("🆕 新試合を開始");}} style={{flex:1,background:"#cc2222",border:"none",borderRadius:8,padding:10,color:"#fff",fontFamily:"inherit",fontSize:11,fontWeight:900,cursor:"pointer"}}>🔄 新しい試合を開始</button>
        <button onClick={()=>setEndSheet(true)} style={{flex:1,background:"#37474f",border:"none",borderRadius:8,padding:10,color:"#fff",fontFamily:"inherit",fontSize:11,fontWeight:900,cursor:"pointer"}}>🏁 試合終了</button>
      </div>
      {endSheet&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:900,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:"16px 16px 0 0",padding:"12px 10px 28px",width:"100%",maxWidth:480}}>
            <div style={{background:"#37474f",borderRadius:8,padding:"8px 12px",marginBottom:10,position:"relative"}}>
              <div style={{fontSize:13,fontWeight:900,color:"#fff",textAlign:"center"}}>🏁 試合終了 — 理由を選択</div>
              <button onClick={()=>setEndSheet(false)} style={{position:"absolute",top:6,right:8,background:"none",border:"none",color:"rgba(255,255,255,.7)",fontSize:18,fontWeight:900,cursor:"pointer",padding:"0 4px",lineHeight:1}}>✕</button>
            </div>
            {[
              ["⏱","時間制限終了","捕球捕球","#e3f2fd","#1558c0"],
              ["🌧","雨天中止","悪天候のため試合中止","#e8f5e9","#2e7d32"],
              ["🌩","雷・荒天","危険な天候のため試合中止","#fff8e1","#f57f17"],
              ["💡","コールド成立","点差によるコールドゲーム","#fff3e0","#e65100"],
              ["📋","その他","その他の理由で試合終了","#f3e5f5","#6a1a8a"],
            ].map(([ico,title,desc,bg,col])=>(
              <button key={title} onClick={()=>{
                setEndSheet(false);
                snap();upd(g=>{g.gameOver=true;addLog(g,`🏁 試合終了（${title}）`,"r");});
                showToast(`🏁 ${title}`);
              }} style={{width:"100%",display:"flex",alignItems:"center",gap:10,background:bg,border:`2.5px solid ${col}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",fontFamily:"inherit",marginBottom:6,textAlign:"left"}}>
                <span style={{fontSize:22,flexShrink:0}}>{ico}</span>
                <div>
                  <div style={{fontSize:13,fontWeight:900,color:col}}>{title}</div>
                  <div style={{fontSize:9,color:"#6b7a8d",marginTop:1}}>{desc}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}
      <button onClick={()=>{upd(()=>cp(INIT_G));showToast("🗑 データを全消去しました");}} style={{width:"100%",background:"#f0f2f5",border:"1.5px solid #cc2222",borderRadius:8,padding:9,color:"#cc2222",fontFamily:"inherit",fontSize:11,fontWeight:900,cursor:"pointer",marginTop:6}}>🗑 全データをリセット（初期化）</button>
    </div>
  );
}


function App(){
  const isViewerOnly=typeof window!=="undefined"&&new URLSearchParams(window.location.search).get("viewer")==="1";
  const[screen,setScreen]=useState("select");
  const[tab,setTab]=useState("live");
  const[menuSheet,setMenuSheet]=useState(false);
  const[correctSheet,setCorrectSheet]=useState(false);
  const [G, setGLocal, pushG, connected] = useFirebaseSync(cp(INIT_G));
  const setG = setGLocal;
  const[toast,setToast]=useState(null);
  const[pi,setPi]=useState({fielder:null,mod:null,traj:null,throws:[],buntType:null,errorType:null});
  const[furinige,setFurinige]=useState(null);
  const[strikePick,setStrikePick]=useState(false);
  const[runnerSheet,setRunnerSheet]=useState(null);
  const[rundownNote,setRundownNote]=useState("");
  const[buntSheet,setBuntSheet]=useState(false);
  const[errorSheet,setErrorSheet]=useState(false);
  const[otherSheet,setOtherSheet]=useState(false);
  const[sfSheet,setSfSheet]=useState(false);
  const snaps=useRef([]);
  const[elapsed,setElapsed]=useState("");
  useEffect(()=>{
    const calc=()=>{
      if(!G.gameStartTime||G.gameOver){setElapsed("");return;}
      const today=G.gameDate||new Date().toISOString().slice(0,10);
      const start=new Date(`${today}T${G.gameStartTime}`);
      const diff=Math.floor((Date.now()-start.getTime())/60000);
      if(diff<0){setElapsed("");return;}
      setElapsed(`${diff}分経過`);
    };
    calc();
    const t=setInterval(calc,30000);
    return()=>clearInterval(t);
  },[G.gameStartTime,G.gameDate,G.gameOver]);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const snap=()=>snaps.current.push(cp(G));
  const undoAction=()=>{if(!snaps.current.length){showToast("戻せません");return;}setG(snaps.current.pop());showToast("↩ 戻しました");};
  const saveHistory=(g)=>{
    try{
      const hist=JSON.parse(localStorage.getItem("yakyu_history")||"[]");
      const entry={
        id:Date.now().toString(),
        savedAt:new Date().toISOString(),
        gameDate:g.gameDate||"",
        gameLocation:g.gameLocation||"",
        gameStartTime:g.gameStartTime||"",
        ourTeam:g.ourTeam,oppTeam:g.oppTeam,
        ourScore:g.ourScore,oppScore:g.oppScore,
        inning:g.inning,maxInnings:g.maxInnings,
        innOur:g.innOur,innOpp:g.innOpp,
        log:g.log,
        lineup:g.lineup,scorebook:g.scorebook,
        lineupThem:g.lineupThem,scorebookThem:g.scorebookThem,
        batFirst:g.batFirst,
      };
      hist.unshift(entry);
      if(hist.length>30)hist.pop();
      localStorage.setItem("yakyu_history",JSON.stringify(hist));
    }catch(e){}
  };
  const upd=fn=>setG(g=>{const ng=cp(g);fn(ng);if(!g.gameOver&&ng.gameOver)setTimeout(()=>saveHistory(ng),0);pushG(ng);return ng;});
  const buildNote=()=>{
    if(!pi.fielder&&!pi.buntType)return"";
    let b="";
    if(pi.buntType){const pfx={sac:"犠B",safety:"安B",squeeze:"スクB"};b=(pfx[pi.buntType]||"B");}
    if(pi.fielder){b+=pi.fielder+(pi.mod||"");if(pi.traj==="F")b="F"+b;else if(pi.traj==="L")b="L"+b;}
    if(pi.throws.length)b+="-"+pi.throws.join("-");
    return b;
  };
  const clearPi=()=>{
    setPi({fielder:null,mod:null,traj:null,throws:[],buntType:null,errorType:null});
    setStrikePick(false);
  };
  const tapFielder=(code,label)=>{
    if(/^[1-9]$/.test(code)&&pi.fielder&&/^[1-9]$/.test(pi.fielder)&&pi.fielder.length===1&&pi.fielder!==code){const c=[pi.fielder,code].sort().join("");setPi(p=>({...p,fielder:c,mod:"間"}));showToast(c+"間");return;}
    if(pi.fielder===code){clearPi();return;}
    setPi(p=>({...p,fielder:code,mod:null}));showToast(label);
  };
  const isOurBat=g=>(g.batFirst&&g.isTop)||(!g.batFirst&&!g.isTop);
  const FIELDER_NAME={"1":"ピッチャー(1)","2":"キャッチャー(2)","3":"ファースト(3)","4":"セカンド(4)","5":"サード(5)","6":"ショート(6)","7":"レフト(7)","8":"センター(8)","9":"ライト(9)","12":"投捕間","13":"投一間","23":"捕一間","34":"一二間","45":"二三間","56":"三遊間"};

  function decodeNote(note,type){
    if(!note||note===type)return"";
    let buntPfx="",rest=note;
    if(rest.startsWith("犠B")){buntPfx="送りバント ";rest=rest.slice(2);}
    else if(rest.startsWith("安B")){buntPfx="セーフティバント ";rest=rest.slice(2);}
    else if(rest.startsWith("スクB")){buntPfx="スクイズ ";rest=rest.slice(3);}
    let trajStr="";
    if(rest.startsWith("F")){trajStr="フライ";rest=rest.slice(1);}
    else if(rest.startsWith("L")){trajStr="ライナー";rest=rest.slice(1);}
    const parts=rest.split("-");
    const fielder=parts[0]||"";
    const throws=parts.slice(1);
    const fKey=fielder.replace(/[前後横間]/g,"");
    const modMatch=fielder.match(/[前後横]/);
    const modStr=modMatch?({"前":"前","後":"後ろ","横":"横"}[modMatch[0]]||modMatch[0]):"";
    let fName="";
    if(fKey.length===2&&FIELDER_NAME[fKey]){fName=FIELDER_NAME[fKey]+"間";}
    else if(fKey.length===1&&FIELDER_NAME[fKey]){fName=FIELDER_NAME[fKey]+(modStr?modStr:"");}
    const throwStr=throws.filter(t=>t).map(t=>{if(t==="E")return"失策";return FIELDER_NAME[t]||t;}).join("→");
    return[buntPfx,trajStr,fName,throwStr&&throwStr!==fName?"→"+throwStr:""].filter(Boolean).join("");
  }

  function describePlay(type,note,name){
    const dec=decodeNote(note,type);
    if(type==="1B")return dec?`${name} 単打（${dec}）`:`${name} 単打`;
    if(type==="2B")return dec?`${name} 二塁打（${dec}）`:`${name} 二塁打`;
    if(type==="3B")return dec?`${name} 三塁打（${dec}）`:`${name} 三塁打`;
    if(type==="HR")return`${name} ホームラン！`;
    if(type==="BB")return`${name} 四球`;
    if(type==="HBP")return`${name} 死球`;
    if(type==="FC")return dec?`${name} 野選（${dec}）`:`${name} 野選`;
    if(type==="K")return`${name} 見逃し三振`;
    if(type==="KS")return`${name} 空振り三振`;
    if(type==="KR")return`${name} 振り逃げ`;
    if(type==="GO")return dec?`${name} ゴロアウト（${dec}）`:`${name} ゴロアウト`;
    if(type==="FO"){const isLiner=note&&(note.startsWith("L")||note.includes("ライナー"));return dec?`${name} ${isLiner?"ライナー":"フライ"}アウト（${dec}）`:`${name} ${isLiner?"ライナー":"フライ"}アウト`;}
    if(type==="DP")return dec?`${name} ゲッツー（${dec}）`:`${name} ゲッツー`;
    if(type==="SF")return dec?`${name} 犠牲フライ（${dec}）`:`${name} 犠牲フライ`;
    if(type==="SH")return dec?`${name} 送りバント（${dec}）`:`${name} 送りバント`;
    return dec?`${name} ${dec}`:note||type;
  }

  const doOut=(g,type,note)=>{
    const isOurs=isOurBat(g);
    const lineup=isOurs?g.lineup:g.lineupThem;
    const cb=isOurs?g.currentBatter:(g.currentBatterThem||0);
    const bat=lineup[cb];
    const name=bat?bat.name:(isOurs?"打者":"相手打者");
    const nameWithOrder=bat?`${cb+1}番 ${bat.name}`:name;
    const inKey=`${g.inning}${g.isTop?"T":"B"}`;
    g.outs++;
    if(type==="DP"){
      g.outs=Math.min(g.outs+1,3);
      // アウトになった走者を特定してログに記録
      const bnames=["一塁","二塁","三塁"];
      for(let i=0;i<3;i++){
        if(g.bases[i]){
          const rn=g.runnerNames?g.runnerNames[i]:null;
          addLog(g,`❌ ${rn?rn:"走者"}（${bnames[i]}）ゲッツーアウト`,"o");
          g.bases[i]=false;if(g.runnerNames)g.runnerNames[i]=null;
          break;
        }
      }
    }
    if(type==="SF")autoScore(g,isOurs);
    if(bat&&type!=="SH"&&type!=="SF"){bat.ab=(bat.ab||0)+1;}
    if(isOurs)setSB(g,inKey,type,note,"");
    else{if(!g.scorebookThem[cb])g.scorebookThem[cb]={};g.scorebookThem[cb][inKey]=type;g.scorebookThem[cb][inKey+"_note"]=note;}
    addLog(g,`❌ ${describePlay(type,note,nameWithOrder)}`,"o");
    // 打席完了→3アウトでも必ず打順を進める
    if(isOurs&&lineup.length)g.currentBatter=(g.currentBatter+1)%lineup.length;
    else if(!isOurs&&g.lineupThem.length)g.currentBatterThem=((g.currentBatterThem||0)+1)%g.lineupThem.length;
    else if(!isOurs)g.currentBatterThem=(g.currentBatterThem||0)+1;
    g.balls=0;g.strikes=0;
    clearPi();
    if(g.outs>=3){addLog(g,"🔄 3アウト チェンジ！","s");showToast("チェンジ！");doChange(g);return;}
    showToast(`${name} ${PL[type]||note}`);
  };

  const doHit=(g,type,note)=>{
    const isOurs=isOurBat(g);
    const lineup=isOurs?g.lineup:g.lineupThem;
    const cb=isOurs?g.currentBatter:(g.currentBatterThem||0);
    const bat=lineup[cb];
    const name=bat?bat.name:(isOurs?"打者":"相手打者");
    const nameWithOrder=bat?`${cb+1}番 ${bat.name}`:name;
    const inKey=`${g.inning}${g.isTop?"T":"B"}`;
    if(bat&&type!=="BB"&&type!=="HBP")bat.ab=(bat.ab||0)+1;
    if(bat&&["1B","2B","3B","HR"].includes(type))bat.hits=(bat.hits||0)+1;
    if(isOurs)setSB(g,inKey,type,note||buildNote()||type,"");
    else{if(!g.scorebookThem[cb])g.scorebookThem[cb]={};g.scorebookThem[cb][inKey]=type;g.scorebookThem[cb][inKey+"_note"]=note||type;}
    if(type==="BB"||type==="HBP"){advBasesBB(g,isOurs,bat||{name:"相手",num:""},bat?cb+1:null);}
    else{advBases(g,ADV[type]||1,type==="HR",isOurs,bat||{name:"相手",num:""},bat?cb+1:null);}
    if(type==="HR"&&bat)bat.rbi=(bat.rbi||0)+1;
    const emoji=type==="BB"||type==="HBP"?"🚶":type==="HR"?"🎉":"✅";
    addLog(g,`${emoji} ${describePlay(type,note,nameWithOrder)}`,type==="BB"||type==="HBP"?"b":"h");
    showToast(`${name} ${PL[type]||type}！`);
    g.balls=0;g.strikes=0;
    if(isOurs&&lineup.length)g.currentBatter=(g.currentBatter+1)%lineup.length;
    else if(!isOurs&&g.lineupThem.length)g.currentBatterThem=((g.currentBatterThem||0)+1)%g.lineupThem.length;
    else if(!isOurs)g.currentBatterThem=(g.currentBatterThem||0)+1;
    clearPi();
  };

  const pitch=t=>{
    if((t==="S"||t==="KS")&&G.strikes===2){const canFuri=!G.bases[0]||G.outs===2;if(canFuri){setStrikePick(false);setFurinige(t);return;}}
    snap();upd(g=>{
      const isOursBatting=isOurBat(g);
      // チーム合計球数
      if(isOursBatting){g.pitchCountThem=(g.pitchCountThem||0)+1;}else{g.pitchCount=(g.pitchCount||0)+1;}
      // 個人球数：守備側チームの投手（pos==="投"または"1"）の選手に加算
      const defLineup=isOursBatting?g.lineupThem:g.lineup;
      const pitcher=defLineup.find(p=>p.pos==="投"||p.pos==="1");
      if(pitcher)pitcher.pitchCount=(pitcher.pitchCount||0)+1;
      if(!g.pitchLog)g.pitchLog=[];
      g.pitchLog.push({inn:g.inning,isTop:g.isTop,pitch:t,t:ts()});
      if(t==="S"){g.strikes++;if(g.strikes>=3){doOut(g,"K","K");return;}addLog(g,"/ 見逃し","s");}
      else if(t==="KS"){g.strikes++;if(g.strikes>=3){doOut(g,"KS","○K");return;}addLog(g,"× 空振り","s");}
      else if(t==="B"){g.balls++;if(g.balls>=4){doHit(g,"BB","B");return;}addLog(g,"⚪ ボール","s");}
      else if(t==="F"){if(g.strikes<2)g.strikes++;addLog(g,"〇 ファール","s");}
    });
  };

  const handleFurinige=choice=>{
    setFurinige(null);snap();
    upd(g=>{
      if(choice==="swing"){doOut(g,"KS","○K");}
      else if(choice==="normal"){doOut(g,"K","K");}
      else if(choice==="safe"||choice==="safe_wp"||choice==="safe_pb"){
        const wpTag=choice==="safe_wp"?" (WP)":choice==="safe_pb"?" (PB)":"";
        const isOurs=isOurBat(g);
        const lineup=isOurs?g.lineup:g.lineupThem;
        const cb=isOurs?g.currentBatter:(g.currentBatterThem||0);
        const bat=lineup[cb];
        const name=bat?bat.name:"打者";
        const inKey=`${g.inning}${g.isTop?"T":"B"}`;
        if(bat)bat.ab=(bat.ab||0)+1;
        if(isOurs)setSB(g,inKey,"KR","K'"+wpTag,"");
        else{if(!g.scorebookThem[cb])g.scorebookThem[cb]={};g.scorebookThem[cb][inKey]="KR";g.scorebookThem[cb][inKey+"_note"]="K'"+wpTag;}
        if(!g.runnerNames)g.runnerNames=[null,null,null];
        const lbl2=bat?`${cb+1}${bat.name.slice(0,2)}`:"?";
        if(!g.bases[0]){g.bases[0]=true;g.runnerNames[0]=lbl2;}else{advBases(g,1,false,isOurs,bat,bat?cb+1:null);}
        addLog(g,`🏃 ${name} 振り逃げ${wpTag?"（"+wpTag.trim()+"）":""}`,"b");
        showToast(`${name} K'振り逃げ！`);
        g.balls=0;g.strikes=0;
        if(isOurs&&lineup.length)g.currentBatter=(g.currentBatter+1)%lineup.length;
        else if(!isOurs&&g.lineupThem.length)g.currentBatterThem=((g.currentBatterThem||0)+1)%g.lineupThem.length;
        else if(!isOurs)g.currentBatterThem=(g.currentBatterThem||0)+1;
        clearPi();
      } else if(choice==="out"){doOut(g,"KR","K' 2-3");}
    });
  };

  const playAction=type=>{
    snap();upd(g=>{
      if(!g.runnerNames)g.runnerNames=[null,null,null];
      const isOurs=isOurBat(g);
      const lineup=isOurs?g.lineup:g.lineupThem;
      const cb=isOurs?g.currentBatter:(g.currentBatterThem||0);
      const bat=lineup[cb];
      if(type==="SB"){
        for(let i=2;i>=0;i--){if(g.bases[i]){g.bases[i]=false;if(i<2){g.bases[i+1]=true;if(g.runnerNames){g.runnerNames[i+1]=g.runnerNames[i];g.runnerNames[i]=null;}}else{autoScore(g,isOurs);if(g.runnerNames)g.runnerNames[i]=null;}break;}}
        addLog(g,`💨 ${bat?bat.name:"走者"} 盗塁成功`,"b");showToast("盗塁！");return;
      }
      if(type==="CS"){
        const bn=["一塁","二塁","三塁"];
        for(let i=2;i>=0;i--){if(g.bases[i]){g.bases[i]=false;g.runnerNames[i]=null;g.outs++;addLog(g,`❌ ${bn[i]}走者 盗塁死`,"o");if(g.outs>=3){addLog(g,"🔄 3アウト チェンジ！","s");showToast("チェンジ！");doChange(g);}else showToast(`${bn[i]} 盗塁死`);return;}}
        showToast("走者がいません");return;
      }
      if(OUTP.includes(type)){doOut(g,type,type);}
      else if(HITS.includes(type)){doHit(g,type,buildNote()||type);}
    });
  };

  const confirmPlay=rt=>{
    const note=buildNote();if(!note){showToast("野手を選んでください");return;}
    const outType=rt==="DP"?"DP":pi.traj==="F"?"FO":pi.traj==="L"?"FO":"GO";
    snap();upd(g=>{
      if(!g.runnerNames)g.runnerNames=[null,null,null];
      if(rt==="HIT")doHit(g,"1B",note);
      else if(rt==="FC")doHit(g,"FC",note);
      else doOut(g,outType,note);
    });
  };

  const handleBaseTap=n=>{
    if(G.bases[n-1]){setRunnerSheet({base:n});setRundownNote("");}
    else{snap();upd(g=>{if(!g.runnerNames)g.runnerNames=[null,null,null];g.bases[n-1]=true;g.runnerNames[n-1]="?";});}
  };

  const doRunnerAction=(action,targetBase)=>{
    const base=runnerSheet.base;setRunnerSheet(null);snap();
    upd(g=>{
      if(!g.runnerNames)g.runnerNames=[null,null,null];
      const isOurs2=isOurBat(g);
      const rn=g.runnerNames[base-1]||"走者";
      const remove=()=>{g.bases[base-1]=false;g.runnerNames[base-1]=null;};
      const advance=to=>{const r=g.runnerNames[base-1];remove();if(to==="home"){autoScore(g,isOurs2);}else{g.bases[to-1]=true;g.runnerNames[to-1]=r;}};
      const out=(msg)=>{remove();g.outs++;addLog(g,`❌ ${rn} ${msg}`,"o");if(g.outs>=3){addLog(g,"🔄 3アウト チェンジ！","s");showToast("チェンジ！");doChange(g);}};
      const bfull=["一塁","二塁","三塁"];
      const toName=targetBase==="home"?"本塁":bfull[targetBase-1]||"";
      if(action==="advance"){advance(targetBase);addLog(g,`🏃 ${rn} →${bfull[targetBase-1]}`,"b");showToast(`${rn} ${bfull[targetBase-1]}へ`);}
      else if(action==="score"){advance("home");addLog(g,`🏠 ${rn} 生還！`,"r");showToast(`${rn} 生還！`);}
      else if(action==="out_touch"){out(`${bfull[base-1]}でタッチアウト`);if(g.outs<3)showToast(`${rn} タッチアウト`);}
      else if(action==="out_force"){out(`${bfull[base-1]}でフォースアウト`);if(g.outs<3)showToast(`${rn} フォースアウト`);}
      else if(action==="out_fly"){out(`飛球アウト`);if(g.outs<3)showToast(`${rn} 飛球アウト`);}
      else if(action==="out"){out(`${bfull[base-1]}でアウト`);if(g.outs<3)showToast(`${rn} アウト`);}
      else if(action==="steal"){advance(targetBase);addLog(g,`💨 ${rn} 盗塁成功`,"b");showToast(`${rn} 盗塁！`);}
      else if(action==="caught"){out(`盗塁死`);if(g.outs<3)showToast(`${rn} 盗塁死`);}
      else if(action==="delayed_steal"){advance(targetBase);addLog(g,`💨 ${rn} ディレードスチール`,"b");showToast(`${rn} DS！`);}
      else if(action==="delayed_caught"){out(`DS失敗`);if(g.outs<3)showToast(`${rn} DS失敗`);}
      else if(action==="wp"){advance(targetBase);addLog(g,`💥 WP 暴投 ${rn}進塁`,"b");showToast(`WP 暴投`);}
      else if(action==="pb"){advance(targetBase);addLog(g,`💥 PB 捕逸 ${rn}進塁`,"b");showToast(`PB 捕逸`);}
      else if(action==="tagup"){advance(targetBase);addLog(g,`✈️ ${rn} タッチアップ`,targetBase==="home"?"r":"b");showToast(`${rn} タッチアップ！`);}
      else if(action==="tagup_fail"){out(`タッチアップ失敗`);if(g.outs<3)showToast(`${rn} タッチアップ失敗`);}
      else if(action==="pickoff"){out(`牽制アウト`);if(g.outs<3)showToast(`${rn} 牽制アウト`);}
      else if(action==="rundown"){const note2=targetBase||"";out(`ランダウンアウト${note2?" "+note2:""}`);if(g.outs<3)showToast(`${rn} ランダウンアウト`);}
      else if(action==="out_at_home"){out("本塁憤死");if(g.outs<3)showToast(`${rn} 本塁憤死！`);}
      else if(action==="def_obst"){out(`守備妨害`);if(g.outs<3)showToast(`${rn} 守備妨害アウト`);}
      else if(action==="run_obst"){advance(targetBase);addLog(g,`⚠ ${rn} 走塁妨害→${toName}進塁付与`,"b");showToast(`${rn} 走塁妨害→進塁`);}
      else if(action==="retreat"){
        const r=g.runnerNames[base-1];
        remove();
        const prev=base-1; // 1つ前の塁（1塁なら0=ホーム付近だが2塁以上のみ表示）
        g.bases[prev-1]=true;g.runnerNames[prev-1]=r;
        showToast(`${rn} ${["","一","二","三"][prev]}塁へ戻す`);
      }
    });
  };

  const doBalk=()=>{
    snap();upd(g=>{
      if(!g.runnerNames)g.runnerNames=[null,null,null];
      const isOurs2=isOurBat(g);
      for(let i=2;i>=0;i--){if(g.bases[i]){const rn=g.runnerNames[i];g.bases[i]=false;g.runnerNames[i]=null;if(i===2){autoScore(g,isOurs2);}else{g.bases[i+1]=true;g.runnerNames[i+1]=rn;}}}
      addLog(g,`⚠ ボーク—走者全員1つ進塁`,"b");showToast("ボーク！走者進塁");
    });
  };

  const doInterference=()=>{
    snap();upd(g=>{
      if(!g.runnerNames)g.runnerNames=[null,null,null];
      const isOurs2=isOurBat(g);
      const lineup=isOurs2?g.lineup:g.lineupThem;
      const cb=isOurs2?g.currentBatter:(g.currentBatterThem||0);

      const name=bat?bat.name:"打者";
      advBasesBB(g,isOurs2,bat||{name:"打者",num:""});
      addLog(g,`⚠ ${name} 打撃妨害—1塁へ`,"b");showToast(`${name} 打撃妨害—1塁へ`);
      g.balls=0;g.strikes=0;
      if(isOurs2&&lineup.length)g.currentBatter=(g.currentBatter+1)%lineup.length;
      else if(!isOurs2&&g.lineupThem.length)g.currentBatterThem=((g.currentBatterThem||0)+1)%g.lineupThem.length;
      clearPi();
    });
  };

  const isOurs=(G.batFirst&&G.isTop)||(!G.batFirst&&!G.isTop);
  const battingTeam=isOurs?G.ourTeam:G.oppTeam;
  const batter=G.lineup[G.currentBatter];
  const half=G.isTop?"表":"裏";
  const sec={fontSize:8,fontWeight:900,letterSpacing:"0.12em",color:C.gray,textTransform:"uppercase",margin:"5px 0 3px"};

  if(screen==="select")return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:24,background:C.bg,minHeight:"100vh",fontFamily:"inherit"}}>

      {(isViewerOnly?[["viewer","🏟","スコアボード観戦","リアルタイム速報（親御さん向け）",C.green,"#f0faf3"]]:[["staff","📋","スタッフ入力モード","スコアを記録する（会場用）",C.gold,"#fffde7"],["viewer","🏟","スコアボード観戦","リアルタイム速報（親御さん向け）",C.green,"#f0faf3"]]).map(([m,ico,t,s,bc,bg])=>(
        <div key={m} onClick={()=>setScreen(m)} style={{width:"100%",maxWidth:340,padding:"16px 20px",borderRadius:12,border:`2px solid ${bc}`,background:bg,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:28}}>{ico}</span><div><div style={{fontSize:15,fontWeight:900,color:bc}}>{t}</div><div style={{fontSize:11,color:C.gray,marginTop:2}}>{s}</div></div>
        </div>
      ))}
      <div onClick={()=>setScreen("history")} style={{width:"100%",maxWidth:340,padding:"16px 20px",borderRadius:12,border:"2px solid #5c35cc",background:"#f0f0ff",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
        <span style={{fontSize:28}}>📚</span><div><div style={{fontSize:15,fontWeight:900,color:"#5c35cc"}}>過去の試合</div><div style={{fontSize:11,color:C.gray,marginTop:2}}>保存された試合結果を見る</div></div>
      </div>
      {!isViewerOnly&&(
        <div style={{width:"100%",maxWidth:340,padding:"8px 14px",borderRadius:10,border:`1.5px solid ${connected?"#1a7a3a":"#e65100"}`,background:connected?"#f0faf3":"#fff8e1",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>{connected?"🟢":"🔴"}</span>
          <span style={{fontSize:11,fontWeight:700,color:connected?"#1a7a3a":"#e65100"}}>{connected?"接続中 — リアルタイム同期中":"オフライン — 接続待機中"}</span>
        </div>
      )}
    </div>
  );

  if(screen==="history")return(
    <div style={{background:"#0a1628",minHeight:"100vh",fontFamily:"inherit",display:"flex",flexDirection:"column"}}>
      <div style={{background:"rgba(0,0,0,.5)",padding:"12px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid rgba(255,255,255,.08)"}}>
        <span style={{fontSize:18}}>📚</span>
        <span style={{flex:1,fontSize:14,fontWeight:900,color:"#fff"}}>過去の試合</span>
        <button onClick={()=>setScreen("select")} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:8,padding:"5px 12px",color:"rgba(255,255,255,.8)",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕ 閉じる</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 10px 24px"}}>
        {(()=>{
          let h=[];
          try{h=JSON.parse(localStorage.getItem("yakyu_history")||"[]");}catch(e){}
          if(!h.length)return(<div style={{textAlign:"center",color:"rgba(255,255,255,.35)",fontSize:13,padding:"60px 0"}}>保存された試合はありません<br/><span style={{fontSize:11,display:"block",marginTop:6}}>試合終了ボタンを押すと自動保存されます</span></div>);
          return h.map(function(item){return(<HistCard key={item.id} h={item} onDelete={null}/>);});
        })()}
      </div>
    </div>
  );

  if(screen==="viewer")return(
    <div style={{background:"linear-gradient(180deg,#0a1628 0%,#0d2040 40%,#0a1628 100%)",height:"100vh",color:"#aaccff",fontFamily:"inherit",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"rgba(255,215,64,.95)",border:"none",borderRadius:100,padding:"8px 20px",fontSize:12,fontWeight:900,color:"#1a2332",zIndex:999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(255,215,64,.5)"}}>{toast}</div>}

      {/* ━━ トップバー ━━ */}
      <div style={{background:"rgba(0,0,0,.5)",backdropFilter:"blur(8px)",padding:"10px 14px",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid rgba(255,255,255,.08)"}}>
        <span style={{fontSize:18}}>⚾</span>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:900,color:"#fff"}}>{G.ourTeam} <span style={{color:"rgba(255,255,255,.75)",fontWeight:400}}>vs</span> {G.oppTeam}</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,.8)",marginTop:1}}>{G.gameDate?G.gameDate+" · ":""}{G.gameLocation?G.gameLocation+" · ":""}{G.inning}回{half} — {isOurs?G.ourTeam:G.oppTeam}の攻撃{elapsed?" ⏱"+elapsed:""}</div>
        </div>
        {G.gameOver
          ?<span style={{fontSize:9,fontWeight:900,color:"#ff4444",background:"rgba(255,68,68,.15)",border:"1px solid rgba(255,68,68,.4)",borderRadius:100,padding:"3px 10px"}}>試合終了</span>
          :<span style={{fontSize:9,fontWeight:900,color:"#ff4444",display:"flex",alignItems:"center",gap:4}}><span style={{width:7,height:7,borderRadius:"50%",background:"#ff4444",display:"inline-block",boxShadow:"0 0 6px #ff4444"}}/>LIVE</span>
        }
      </div>

      {/* ━━ スコアボード ━━ */}
      <div style={{margin:"10px 10px 0",background:"rgba(0,0,0,.45)",border:"1px solid rgba(255,255,255,.08)",borderRadius:12,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,.4)"}}>
        {/* ヘッダー行（イニング番号） */}
        <div style={{display:"flex",background:"rgba(255,255,255,.04)",borderBottom:"1px solid rgba(255,255,255,.07)"}}>
          <div style={{width:68,padding:"4px 8px",fontSize:9,color:"rgba(255,255,255,.75)",fontWeight:700,flexShrink:0}}>TEAM</div>
          <div style={{flex:1,display:"flex",overflowX:"auto"}}>
            {Array.from({length:Math.max(G.maxInnings,G.inning)},(_,i)=>{
              const inn=i+1;
              const isCurrentInn=inn===G.inning;
              return(
                <div key={i} style={{minWidth:28,textAlign:"center",padding:"4px 2px",fontSize:9,fontWeight:900,color:isCurrentInn?"#ffd740":"rgba(255,255,255,.6)",background:isCurrentInn?"rgba(255,215,64,.08)":""}}>{inn}</div>
              );
            })}
          </div>
          <div style={{width:36,textAlign:"center",padding:"4px 4px",fontSize:9,fontWeight:900,color:"#ffd740",borderLeft:"1px solid rgba(255,255,255,.07)"}}>R</div>
        </div>
        {/* チーム行 */}
        {[[G.ourTeam,G.innOur,G.ourScore,isOurs],[G.oppTeam,G.innOpp,G.oppScore,!isOurs]].map(([team,inn,sc,isBatting],ri)=>(
          <div key={ri} style={{display:"flex",alignItems:"center",borderTop:ri>0?"1px solid rgba(255,255,255,.05)":"none",background:isBatting?"rgba(255,215,64,.05)":""}}>
            <div style={{width:68,padding:"7px 8px",fontWeight:900,fontSize:12,color:isBatting?"#ffd740":ri===0?"#aaff70":"#7ec8ff",flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
              {isBatting&&<span style={{width:5,height:5,borderRadius:"50%",background:"#ffd740",display:"inline-block",boxShadow:"0 0 6px #ffd740",flexShrink:0}}/>}
              {String(team).slice(0,5)}
            </div>
            <div style={{flex:1,display:"flex",overflowX:"auto"}}>
              {Array.from({length:Math.max(G.maxInnings,G.inning)},(_,i)=>{
                const inn2=i+1;
                const isCurrentInn=inn2===G.inning;
                const val=inn[i];
                return(
                  <div key={i} style={{minWidth:28,textAlign:"center",padding:"6px 2px",fontSize:12,fontWeight:val>0?900:400,color:val>0?(isBatting?"#ffd740":ri===0?"#aaff70":"#7ec8ff"):"rgba(255,255,255,.2)",background:isCurrentInn?(isBatting?"rgba(255,215,64,.12)":"rgba(255,255,255,.04)"):""}}>{val!==undefined?val:"·"}</div>
                );
              })}
            </div>
            <div style={{width:36,textAlign:"center",padding:"6px 4px",fontWeight:900,fontSize:20,color:isBatting?"#ffd740":ri===0?"#aaff70":"#7ec8ff",borderLeft:"1px solid rgba(255,255,255,.07)"}}>{sc}</div>
          </div>
        ))}
      </div>

      {/* ━━ BSO＋バッター 横並び ━━ */}
      <div style={{margin:"10px 10px 0",display:"flex",gap:8}}>
        {/* BSOカード */}
        <div style={{background:"rgba(0,0,0,.45)",border:"1px solid rgba(255,255,255,.08)",borderRadius:12,padding:"8px 10px",boxShadow:"0 4px 16px rgba(0,0,0,.3)",position:"relative",overflow:"hidden",flexShrink:0}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#ffd740,transparent)"}}/>
          {/* イニング */}
          <div style={{fontSize:11,fontWeight:900,color:"#ffd740",marginBottom:6,letterSpacing:".03em"}}>{G.inning}回{half}</div>
          {/* BSO + ダイヤモンド 横並び */}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {/* BSO */}
            <div>
              {[
                ["B",G.balls,3,"#00dd44","0 0 8px #00dd44, 0 0 16px rgba(0,221,68,.4)"],
                ["S",G.strikes,2,"#ffdd00","0 0 8px #ffdd00, 0 0 16px rgba(255,221,0,.4)"],
                ["O",G.outs,2,"#ff3333","0 0 8px #ff3333, 0 0 16px rgba(255,51,51,.4)"],
              ].map(([lbl,cnt,max,col,shadow])=>(
                <div key={lbl} style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
                  <span style={{fontSize:8,fontWeight:900,color:"rgba(255,255,255,.85)",width:9}}>{lbl}</span>
                  <div style={{display:"flex",gap:3}}>
                    {Array.from({length:max},(_,i)=>(
                      <div key={i} style={{width:12,height:12,borderRadius:"50%",background:i<cnt?col:"rgba(255,255,255,.07)",border:`1.5px solid ${i<cnt?col:"rgba(255,255,255,.12)"}`,boxShadow:i<cnt?shadow:"inset 0 1px 3px rgba(0,0,0,.5)",transition:"all .2s"}}/>
                    ))}

              <div style={{position:"absolute",left:21,top:22,width:6,height:6,background:"rgba(255,255,255,.15)",borderRadius:"50%"}}/>

          </div>
        </div>
        {/* 打者カード */}
        <div style={{flex:1,background:"rgba(0,0,0,.45)",border:"1px solid rgba(255,255,255,.08)",borderRadius:12,padding:"8px 10px",boxShadow:"0 4px 16px rgba(0,0,0,.3)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#7ec8ff,transparent)"}}/>
          <div style={{fontSize:7,fontWeight:900,color:"#7ec8ff",letterSpacing:".12em",marginBottom:4}}>NOW BATTING</div>
          {(()=>{
            const themBat=G.lineupThem[(G.currentBatterThem||0)%Math.max(G.lineupThem.length,1)];
            const showBat=isOurs?batter:themBat;
            const showIdx=isOurs?G.currentBatter:(G.currentBatterThem||0);
            return(
              <>
                <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:2}}>
                  <span style={{fontSize:20,fontWeight:900,color:"#ffd740",lineHeight:1}}>{showBat?showIdx+1:"-"}</span>
                  <span style={{fontSize:8,color:"rgba(255,255,255,.85)"}}>番</span>
                </div>
                <div style={{fontSize:15,fontWeight:900,color:"#fff",lineHeight:1.1,marginBottom:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{showBat?showBat.name:"—"}</div>
                <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                  <span style={{fontSize:8,color:"rgba(255,255,255,.85)"}}>{showBat?showBat.pos:""}{showBat?.num?` #${showBat.num}`:""}</span>
                </div>
              </>
            );
          })()}
        </div>
        {/* 投手カード */}
        <div style={{flex:1,background:"rgba(0,0,0,.45)",border:"1px solid rgba(255,255,255,.08)",borderRadius:12,padding:"8px 10px",boxShadow:"0 4px 16px rgba(0,0,0,.3)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#5599cc,transparent)"}}/>
          <div style={{fontSize:7,fontWeight:900,color:"#7ec8ff",letterSpacing:".12em",marginBottom:4}}>PITCHER</div>
          {(()=>{
            const defLineup=isOurs?G.lineupThem:G.lineup;
            const pitcher=defLineup.find(p=>p.pos==="投"||p.pos==="1");
            const pc=pitcher?(pitcher.pitchCount||0):(isOurs?(G.pitchCountThem||0):(G.pitchCount||0));
            return(
              <>
                <div style={{fontSize:15,fontWeight:900,color:"#fff",lineHeight:1.1,marginBottom:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{pitcher?pitcher.name:"—"}</div>
                <div style={{fontSize:8,color:"rgba(255,255,255,.7)",marginBottom:4}}>{pitcher?.num?`#${pitcher.num}`:""}</div>
                <div style={{display:"flex",alignItems:"baseline",gap:3}}>
                  <span style={{fontSize:20,fontWeight:900,color:"#7ec8ff",lineHeight:1}}>{pc}</span>
                  <span style={{fontSize:8,color:"rgba(255,255,255,.85)"}}>球</span>
                </div>
              </>
            );
          })()}
        </div>
      </div>
