                  {key:"int",ico:"妨",title:"打撃妨害",col:"#607d8b",bg:"#eceff1",action:()=>{doInterference();setOtherSheet(false);}},
                  {key:"iff",ico:"IFF",title:"インフィールドフライ",col:"#1565c0",bg:"#e3f2fd",action:()=>{snap();upd(g=>{const isO=isOurBat(g);const lu=isO?g.lineup:g.lineupThem;const cb=isO?g.currentBatter:(g.currentBatterThem||0);const bat=lu[cb];const name=bat?bat.name:"打者";const nameWithOrder=bat?`${cb+1}番 ${bat.name}`:name;const inKey=`${g.inning}${g.isTop?"T":"B"}`;if(bat)bat.ab=(bat.ab||0)+1;if(isO)setSB(g,inKey,"FO","IFF","");else{if(!g.scorebookThem[cb])g.scorebookThem[cb]={};g.scorebookThem[cb][inKey]="FO";g.scorebookThem[cb][inKey+"_note"]="IFF";}g.outs++;addLog(g,`📢 ${nameWithOrder} IFF—打者自動アウト`,"o");if(g.outs>=3){addLog(g,"🔄 3アウト チェンジ！","s");showToast("チェンジ！");doChange(g);}else{showToast(`${name} IFF自動アウト`);g.balls=0;g.strikes=0;if(isO&&lu.length)g.currentBatter=(g.currentBatter+1)%lu.length;else if(!isO&&g.lineupThem.length)g.currentBatterThem=((g.currentBatterThem||0)+1)%g.lineupThem.length;else if(!isO)g.currentBatterThem=(g.currentBatterThem||0)+1;}clearPi();});setOtherSheet(false);}},
                  {key:"def_bat",ico:"打妨",title:"守備妨害（打者）",col:"#880e4f",bg:"#fce4ec",action:()=>{snap();upd(g=>{const isO=isOurBat(g);const lu=isO?g.lineup:g.lineupThem;const cb=isO?g.currentBatter:(g.currentBatterThem||0);const bat=lu[cb];const name=bat?bat.name:"打者";const nameWithOrder=bat?`${cb+1}番 ${bat.name}`:name;const inKey=`${g.inning}${g.isTop?"T":"B"}`;if(isO)setSB(g,inKey,"FO","守備妨害","");else{if(!g.scorebookThem[cb])g.scorebookThem[cb]={};g.scorebookThem[cb][inKey]="FO";g.scorebookThem[cb][inKey+"_note"]="守備妨害";}g.outs++;addLog(g,`⚠ ${nameWithOrder} 守備妨害—打者アウト`,"o");if(g.outs>=3){addLog(g,"🔄 3アウト チェンジ！","s");showToast("チェンジ！");doChange(g);}else{showToast(`${name} 守備妨害アウト`);g.balls=0;g.strikes=0;if(isO&&lu.length)g.currentBatter=(g.currentBatter+1)%lu.length;else if(!isO&&g.lineupThem.length)g.currentBatterThem=((g.currentBatterThem||0)+1)%g.lineupThem.length;else if(!isO)g.currentBatterThem=(g.currentBatterThem||0)+1;}clearPi();});setOtherSheet(false);}},
                ].map(({key,ico,title,col,bg,action})=>(
                  <button key={key} onClick={action} style={{width:"100%",display:"flex",alignItems:"center",gap:12,background:bg,border:`2px solid ${col}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",fontFamily:"inherit",marginBottom:8,textAlign:"left"}}>
                    <div style={{width:46,height:46,borderRadius:8,background:col,color:"#fff",fontWeight:900,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,lineHeight:1}}>{ico}</div>
                    <div style={{fontSize:13,fontWeight:900,color:col}}>{title}</div>
                  </button>
                ))}
                <button onClick={()=>setOtherSheet(false)} style={{width:"100%",background:"#f0f2f5",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 0",color:C.gray,fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>閉じる</button>
              </div>
            </div>
          )}
          {errorSheet&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:900,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
              <div style={{background:"#fff",borderRadius:"18px 18px 0 0",padding:16,width:"100%",maxWidth:480,paddingBottom:28}}>
                <div style={{background:"#7f1010",borderRadius:10,padding:"10px 14px",marginBottom:12,position:"relative"}}>
                  <div style={{fontSize:14,fontWeight:900,color:"#ffd740",textAlign:"center"}}>⚠ 失策（エラー）を記録</div>
                  <button onClick={()=>setErrorSheet(false)} style={{position:"absolute",top:8,right:10,background:"none",border:"none",color:"#ffaaaa",fontSize:18,fontWeight:900,cursor:"pointer"}}>✕</button>
                </div>
                <div style={{display:"flex",gap:6,marginBottom:12}}>
                  {[["catch","捕球ミス"],["throw","悪送球"]].map(([k,lbl])=>{const sel=pi.errorType===k;return(<button key={k} onClick={()=>setPi(p=>({...p,errorType:p.errorType===k?null:k}))} style={{flex:1,padding:"10px 6px",border:`2px solid ${sel?C.red:C.border}`,borderRadius:10,background:sel?"#fff5f5":"#fafafa",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}><div style={{fontSize:13,fontWeight:900,color:sel?C.red:C.text}}>{lbl}</div></button>);})}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
                  {[["1","投手"],["2","捕手"],["3","一塁手"],["4","二塁手"],["5","三塁手"],["6","遊撃手"],["7","左翼手"],["8","中堅手"],["9","右翼手"]].map(([num,pos])=>(
                    <button key={num} onClick={()=>{
                      const etype=pi.errorType;
                      const etag=etype==="catch"?"捕球ミス":etype==="throw"?"悪送球":"";
                      const eNote=(buildNote()||"")+`-E${num}`;
                      setErrorSheet(false);snap();
                      upd(g=>{
                        const isOurs=isOurBat(g);const lineup=isOurs?g.lineup:g.lineupThem;
                        const cb=isOurs?g.currentBatter:(g.currentBatterThem||0);
                        const bat=lineup[cb];const nameWithOrder=bat?`${cb+1}番 ${bat.name}`:"打者";
                        const inKey=`${g.inning}${g.isTop?"T":"B"}`;
                        if(bat)bat.ab=(bat.ab||0)+1;
                        if(isOurs)setSB(g,inKey,"1B",eNote,"");
                        else{if(!g.scorebookThem[cb])g.scorebookThem[cb]={};g.scorebookThem[cb][inKey]="1B";g.scorebookThem[cb][inKey+"_note"]=eNote;}
                        advBases(g,1,false,isOurs,bat||{name:"打者",num:""},bat?cb+1:null);
                        const posName=FIELDER_NAME[num]||num;
                        addLog(g,`⚠ ${nameWithOrder} 失策セーフ（${posName} E${num}）`,"b");
                        showToast(`失策！${posName} E${num}`);
                        g.balls=0;g.strikes=0;
                        if(isOurs&&lineup.length)g.currentBatter=(g.currentBatter+1)%lineup.length;
                        else if(!isOurs&&g.lineupThem.length)g.currentBatterThem=((g.currentBatterThem||0)+1)%g.lineupThem.length;
                        else if(!isOurs)g.currentBatterThem=(g.currentBatterThem||0)+1;
                      });clearPi();
                    }} style={{padding:"12px 4px",border:`2px solid ${C.border}`,borderRadius:10,background:"#f8fafc",cursor:"pointer",fontFamily:"inherit",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <span style={{fontSize:22,fontWeight:900,color:C.red}}>{num}</span>
                      <span style={{fontSize:10,color:C.gray,fontWeight:700}}>{pos}</span>
                    </button>
                  ))}
                </div>
                <button onClick={()=>setErrorSheet(false)} style={{width:"100%",background:"#f0f2f5",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 0",color:C.gray,fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer"}}>キャンセル</button>
              </div>
            </div>
          )}
          {runnerSheet&&(()=>{
            const b=runnerSheet.base;
            const rn=G.runnerNames[b-1]||"走者";
            const bn=["1塁","2塁","3塁"];
            const next=b===1?2:b===2?3:"home";
            const bigBtn=(lbl,action,tb,bg,col,emoji="")=>(
              <button onClick={()=>doRunnerAction(action,tb)} style={{padding:"12px 4px",border:`2px solid ${col}`,borderRadius:10,background:bg,color:col,fontFamily:"inherit",fontSize:12,fontWeight:900,cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                {emoji&&<span style={{fontSize:16,lineHeight:1}}>{emoji}</span>}{lbl}
              </button>
            );
            const smBtn=(lbl,action,tb,col)=>(
              <button key={lbl} onClick={()=>doRunnerAction(action,tb)} style={{padding:"8px 4px",border:`1.5px solid ${col}`,borderRadius:7,background:"#fff",color:col,fontFamily:"inherit",fontSize:10,fontWeight:900,cursor:"pointer",textAlign:"center"}}>{lbl}</button>
            );
            return(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:950,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget){setRunnerSheet(null);setRundownNote("");}}}>
                <div style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
                  {/* ヘッダー */}
                  <div style={{background:"#01579b",borderRadius:"16px 16px 0 0",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
                    <div style={{fontSize:14,fontWeight:900,color:"#fff"}}>🏃 {rn}（{bn[b-1]}）</div>
                    <button onClick={()=>{setRunnerSheet(null);setRundownNote("");}} style={{background:"none",border:"none",fontSize:20,color:"rgba(255,255,255,.8)",cursor:"pointer",padding:"0 4px",lineHeight:1}}>✕</button>
                  </div>
                  {/* スクロール可能なコンテンツ */}
                  <div style={{overflowY:"auto",padding:"12px 10px 24px"}}>
                    {/* 基本操作（大ボタン） */}
                    <div style={{display:"grid",gridTemplateColumns:b===1?"1fr 1fr 1fr":b===2?"1fr 1fr 1fr":"1fr 1fr",gap:6,marginBottom:6}}>
                      {b===1&&bigBtn("→2塁","advance",2,"#e8f5e9",C.green,"➡️")}
                      {b===1&&bigBtn("→3塁","advance",3,"#e8f5e9",C.green,"⏩")}
                      {b===2&&bigBtn("→3塁","advance",3,"#e8f5e9",C.green,"➡️")}
                      {bigBtn("得　点","score","home","#fffde7",C.gold,"🏠")}
                      {b>=2&&bigBtn("前塁戻す","retreat",null,"#f3e5f5","#6a1a8a","↩")}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
                      {bigBtn("盗塁成功","steal",next,"#e8f5e9",C.green,"💨")}
                      {bigBtn("盗塁死","caught",next,"#fff5f5",C.red,"❌")}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}}>
                      {bigBtn("タッチ\nアウト","out_touch",null,"#fff5f5",C.red,"🤚")}
                      {bigBtn("フォース\nアウト","out_force",null,"#fff5f5",C.red,"🔴")}
                      {bigBtn("牽制\nアウト","pickoff",null,"#fff5f5",C.red,"⚠️")}
                    </div>
                    {/* 特殊操作（小ボタン） */}
                    <div style={{borderTop:`1px dashed ${C.border}`,paddingTop:8}}>
                      <div style={{fontSize:8,color:C.gray,fontWeight:900,marginBottom:5}}>その他・特殊プレー</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:4}}>
                        {smBtn("タッチアップ成功","tagup",next,C.green)}
                        {smBtn("タッチアップ失敗","tagup_fail",null,C.red)}
                        {smBtn("DS成功","delayed_steal",next,"#0288d1")}
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:4}}>
                        {smBtn("DS失敗","delayed_caught",next,C.red)}
                        {smBtn("エラー進塁","error_advance",next,"#e65100")}
                        {smBtn("本塁憤死","out_at_home",null,C.red)}
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:6}}>
                        {smBtn("WP暴投","wp",next,"#795548")}
                        {smBtn("PB捕逸","pb",next,"#795548")}
                        {smBtn("走塁妨害","run_obst",next,"#e65100")}
                      </div>
                      <div style={{display:"flex",gap:4}}>
                        <input value={rundownNote} onChange={e=>setRundownNote(e.target.value)} placeholder="ランダウン 例:6-4-2" style={{flex:1,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 8px",fontSize:11,fontFamily:"inherit",outline:"none"}}/>
                        <button onClick={()=>doRunnerAction("rundown",rundownNote)} style={{padding:"6px 12px",border:`1.5px solid #6a1a8a`,borderRadius:7,background:"#f3e5f5",color:"#6a1a8a",fontFamily:"inherit",fontSize:10,fontWeight:900,cursor:"pointer"}}>実行</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}
          <div style={sec}>📜 速報ログ</div>
          <div style={{background:"#f8fafc",border:`1.5px solid ${C.border}`,borderRadius:8,maxHeight:200,overflowY:"auto"}}>
            {!G.log.length&&<div style={{padding:10,color:C.gray,fontSize:10,textAlign:"center"}}>記録なし</div>}
            {G.log.map((l,i)=>(
              <div key={i} style={{display:"flex",gap:6,padding:"5px 8px",borderBottom:`1px solid #e8ecf0`,fontSize:10,color:l.type==="r"?"#cc2222":l.type==="o"?"#c05000":l.type==="b"?C.blue:C.text}}>
                <span style={{fontSize:7,color:C.gray,flexShrink:0,marginTop:1}}>{l.t}</span><span style={{flex:1,lineHeight:1.4}}>{l.msg}</span>
              </div>
            ))}
          </div>
        </>}
        {tab==="score"&&<ScoreTab G={G} C={C} sec={sec}/>}
        {tab==="lineup"&&<LineupTab G={G} upd={upd} snap={snap} showToast={showToast} C={C} sec={sec}/>}
        {tab==="config"&&<>
          <div style={sec}>試合設定</div>
          <ConfigPanel G={G} upd={upd} showToast={showToast} snap={snap}/>
        </>}
        {tab==="history"&&<HistoryTab/>}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
